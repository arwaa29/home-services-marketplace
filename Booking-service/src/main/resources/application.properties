spring.application.name=booking-service

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5438/bookingdb
spring.datasource.username=booking_admin
spring.datasource.password=booking_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

jwt.secret=homeservices_secret_key_must_be_very_long_for_security_1234567890
jwt.expiration=86400000